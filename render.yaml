services:
  - type: web
    name: la-norma-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false                # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false                # Set to your Vercel/Netlify URL

services:
  - type: web
    name: la-norma-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    # ── Persistent disk ───────────────────────────────────────────
    # Mounts a persistent volume at server/data/ so db.json survives
    # deploys and restarts. Requires Render Starter plan or higher.
    disk:
      name: la-norma-db
      mountPath: /opt/render/project/src/server/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true        # Render auto-generates a secure random value
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false                # Set manually in Render dashboard
      - key: CORS_ORIGIN
        sync: false                # Set to your Vercel frontend URL
